[build]
builder = "nixpacks"

[deploy]
startCommand = "node server/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 6

healthcheckPath = "/health"
healthcheckTimeout = 100
healthcheckInterval = 15

[env]
PORT = "4500"
NODE_ENV = "production"
PLATFORM_NAME = "GlowX"
CREATOR_PAYOUT_PERCENTAGE = "70"
